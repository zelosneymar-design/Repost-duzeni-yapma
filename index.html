<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Grid Bölücü (Kare Sabitli)</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg-dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
        }

        .upload-container {
            background: #2c2c2c;
            border: 2px dashed var(--primary);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary);
            color: var(--bg-dark);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .custom-file-upload:active {
            transform: scale(0.95);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
        }

        .grid-item {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            box-sizing: border-box;
        }

        .grid-item canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1; /* Ekrandaki önizlemeyi de tam kare yapar */
            display: block;
            border-radius: 4px;
            object-fit: cover;
        }

        .download-btn {
            width: 100%;
            background: var(--white);
            color: var(--bg-dark);
            border: none;
            padding: 8px 0;
            margin-top: 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .download-btn:active {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <h1>TikTok Grid Bölücü</h1>
    <div class="subtitle">Fotoğrafın ortasından kusursuz 1:1 kare keser ve eşit böler.</div>

    <div class="upload-container">
        <p>Bölmek istediğin fotoğrafı seç:</p>
        <label for="file-upload" class="custom-file-upload">
            Fotoğraf Seç
        </label>
        <input id="file-upload" type="file" accept="image/*">
    </div>

    <div class="grid-container" id="gridContainer"></div>

    <script>
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    processSquareImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function processSquareImage(img) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = ''; 

            // 1. ADIM: Fotoğrafın kısa kenarını bulup merkezden bir kare (1:1) alan belirliyoruz
            const size = Math.min(img.width, img.height);
            
            // Fotoğraf yatay mı dikey mi? Merkezlemek için başlangıç noktalarını (X ve Y) hesapla
            const sourceX = (img.width - size) / 2;
            const sourceY = (img.height - size) / 2;

            // 2. ADIM: Bu kare alanı 3 eşit parçaya bölüyoruz
            const pieceSize = size / 3;

            let count = 1;
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    
                    const gridItem = document.createElement('div');
                    gridItem.className = 'grid-item';

                    // Çıkan parçanın tam kare (1:1) olmasını garanti ediyoruz
                    const canvas = document.createElement('canvas');
                    canvas.width = pieceSize;
                    canvas.height = pieceSize;
                    const ctx = canvas.getContext('2d');

                    // Resmi tam merkezden kırparak canvas'a çiz
                    ctx.drawImage(
                        img, 
                        sourceX + (c * pieceSize), sourceY + (r * pieceSize), pieceSize, pieceSize, // Kaynaktan kırpılan alan
                        0, 0, pieceSize, pieceSize // Canvas'a oturtulan alan
                    );

                    const downloadBtn = document.createElement('a');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.innerText = `Parça ${count}`;
                    
                    // Netlik bozulmasın diye yüksek kalitede çıktı alıyoruz
                    downloadBtn.href = canvas.toDataURL('image/jpeg', 0.95);
                    downloadBtn.download = `tiktok_grid_${count}.jpg`;

                    gridItem.appendChild(canvas);
                    gridItem.appendChild(downloadBtn);
                    container.appendChild(gridItem);

                    count++;
                }
            }
        }
    </script>
</body>
</html>
