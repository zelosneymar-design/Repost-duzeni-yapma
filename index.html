<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Repost Grid Bölücü</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg-dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
        }

        .upload-container {
            background: #2c2c2c;
            border: 2px dashed var(--primary);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .mode-container {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            background: #333;
            color: var(--white);
            border: 2px solid #444;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary);
            color: var(--bg-dark);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
        }

        .grid-item {
            background: #222;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            box-sizing: border-box;
        }

        .grid-item canvas {
            width: 100%;
            height: auto;
            /* TikTok Repost Video Önizleme Oranı (3:4) */
            aspect-ratio: 3 / 4; 
            display: block;
            border-radius: 4px;
            object-fit: cover;
        }

        .download-btn {
            width: 100%;
            background: var(--white);
            color: var(--bg-dark);
            border: none;
            padding: 8px 0;
            margin-top: 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .download-btn:active {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <h1>TikTok Repost Bölücü</h1>
    <div class="subtitle">Gerçek TikTok Repost (3:4) video boyutuna göre kusursuz böler.</div>

    <div class="mode-container">
        <button class="mode-btn active" id="btn3" onclick="setMode(3)">3 Parça (Yan Yana)</button>
        <button class="mode-btn" id="btn9" onclick="setMode(9)">9 Parça (Büyük Grid)</button>
    </div>

    <div class="upload-container">
        <p>Bölmek istediğin fotoğrafı seç:</p>
        <label for="file-upload" class="custom-file-upload">
            Fotoğraf Seç
        </label>
        <input id="file-upload" type="file" accept="image/*">
    </div>

    <div class="grid-container" id="gridContainer"></div>

    <script>
        let currentMode = 3; 
        let lastLoadedImg = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn3').classList.toggle('active', mode === 3);
            document.getElementById('btn9').classList.toggle('active', mode === 9);
            
            if (lastLoadedImg) {
                processTikTokImage(lastLoadedImg);
            }
        }

        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    lastLoadedImg = img;
                    processTikTokImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function processTikTokImage(img) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = ''; 

            if (currentMode === 9) {
                // 9'LU REPOST MODU: Toplam alanın en-boy oranı 3:4 olmalı (Genişlik: W, Yükseklik: W * (4/3))
                let targetWidth = img.width;
                let targetHeight = targetWidth * (4 / 3);

                if (targetHeight > img.height) {
                    targetHeight = img.height;
                    targetWidth = targetHeight * (3 / 4);
                }

                const sourceX = (img.width - targetWidth) / 2;
                const sourceY = (img.height - targetHeight) / 2;

                // Her bir parçanın genişlik ve yüksekliği (Kendi içlerinde 3:4 oranında)
                const pieceWidth = targetWidth / 3;
                const pieceHeight = targetHeight / 3;

                let count = 1;
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        createGridPiece(img, sourceX + (c * pieceWidth), sourceY + (r * pieceHeight), pieceWidth, pieceHeight, count);
                        count++;
                    }
                }
            } else if (currentMode === 3) {
                // 3'LÜ REPOST MODU: Yan yana 3 tane 3:4 parça birleşince toplam oran 9:4 olur.
                let targetWidth = img.width;
                let targetHeight = targetWidth * (4 / 9);

                if (targetHeight > img.height) {
                    targetHeight = img.height;
                    targetWidth = targetHeight * (9 / 4);
                }

                const sourceX = (img.width - targetWidth) / 2;
                const sourceY = (img.height - targetHeight) / 2;

                const pieceWidth = targetWidth / 3;
                const pieceHeight = targetHeight; // Tek satır olduğu için yükseklik değişmez

                for (let c = 0; c < 3; c++) {
                    createGridPiece(img, sourceX + (c * pieceWidth), sourceY, pieceWidth, pieceHeight, c + 1);
                }
            }
        }

        function createGridPiece(img, sx, sy, sw, sh, index) {
            const container = document.getElementById('gridContainer');
            const gridItem = document.createElement('div');
            gridItem.className = 'grid-item';

            const canvas = document.createElement('canvas');
            canvas.width = sw;
            canvas.height = sh;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

            const downloadBtn = document.createElement('a');
            downloadBtn.className = 'download-btn';
            downloadBtn.innerText = `Parça ${index}`;
            downloadBtn.href = canvas.toDataURL('image/jpeg', 0.95);
            downloadBtn.download = `tiktok_repost_${index}.jpg`;

            gridItem.appendChild(canvas);
            gridItem.appendChild(downloadBtn);
            container.appendChild(gridItem);
        }
    </script>
</body>
</html>
